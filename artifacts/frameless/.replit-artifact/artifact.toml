kind = "web"
previewPath = "/"
title = "Frameless Creative"
version = "1.0.0"
id = "artifacts/frameless"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22245

[services.development]
run = "pnpm --filter @workspace/frameless run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/frameless", "run", "build" ]
publicDir = "artifacts/frameless/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22245"
BASE_PATH = "/"
